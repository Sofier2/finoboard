{% extends 'base.html' %}

{% block content %}

<style>
.form-wrapper {
    max-width: 600px;
    margin: 60px auto;
    padding: 40px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    color: white;
    backdrop-filter: blur(10px);
}

label {
    display: block;
    margin: 10px 0 5px;
    font-size: 14px;
    color: #cbd5e1;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

textarea {
    min-height: 120px;
    resize: none;
}

button {
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
}
</style>

<div class="form-wrapper">

<h2 style="text-align:center;">Редагування заявки</h2>

<form method="post">
    {% csrf_token %}

    <!-- 🔵 НАЗВА -->
    <label>📌 Назва заявки</label>
    <input type="text" name="title" value="{{ req.title }}">

    <!-- 🟡 ОПИС -->
    <label>📝 Опис заявки</label>
    <textarea name="description">{{ req.description }}</textarea>

    <!-- 🟢 БЮДЖЕТ -->
    <label>💰 Бюджет (грн)</label>
    <input type="number" name="budget" value="{{ req.budget }}">

    <button type="submit">Зберегти зміни</button>
</form>

</div>

{% endblock %}
