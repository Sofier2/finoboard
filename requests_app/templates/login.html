{% extends 'base.html' %}

{% block content %}

<div class="auth-login-wrapper">
    <h1>Вхід у FinoBoard</h1>

    <p class="auth-login-subtitle">Увійдіть, щоб керувати заявками</p>

    <div class="auth-login-hint">
        🔐 Безпечний вхід у систему
    </div>

    {% if error %}
        <div class="auth-login-error-box">
            ❌ {{ error }}
        </div>
    {% endif %}

    <form method="post" class="auth-login-form">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Логін" required>

        <input type="password" name="password" placeholder="Пароль" required>

        <button type="submit" class="auth-login-btn">Увійти</button>
    </form>

    <div class="auth-login-extra">
        Немає акаунту?
        <a href="{% url 'register' %}" style="color:#22c55e;">Зареєструватися</a>
    </div>
</div>

{% endblock %}
